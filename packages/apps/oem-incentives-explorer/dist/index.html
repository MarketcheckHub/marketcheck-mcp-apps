:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #334155;
  --border: #475569;
  --text: #f1f5f9;
  --text-muted: #94a3b8;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f97316;
  --purple: #a855f7;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
.app-header {
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.app-header-text { flex: 1; min-width: 0; }
.app-header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
}
.app-header h1 span { color: var(--accent); }
.app-header p { color: var(--text-muted); font-size: 13px; margin-top: 4px; }

/* Search Bar */
.search-section {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 16px 24px;
}
.search-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  flex-wrap: wrap;
}
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-group label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
}
select, input[type="text"] {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 14px;
  min-width: 140px;
  outline: none;
  transition: border-color 0.2s;
}
select:focus, input[type="text"]:focus { border-color: var(--accent); }
.btn-primary {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 20px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
  white-space: nowrap;
  height: 37px;
}
.btn-primary:hover { background: var(--accent-hover); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.compare-section {
  margin-top: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.compare-section span {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 500;
}
.compare-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface2);
  border-radius: 16px;
  padding: 4px 12px 4px 14px;
  font-size: 13px;
}
.compare-tag .remove-compare {
  cursor: pointer;
  color: var(--text-muted);
  font-size: 16px;
  line-height: 1;
  transition: color 0.15s;
}
.compare-tag .remove-compare:hover { color: var(--red); }
.btn-add-compare {
  background: transparent;
  color: var(--accent);
  border: 1px dashed var(--accent);
  border-radius: 16px;
  padding: 4px 14px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-add-compare:hover { background: rgba(59,130,246,0.1); }
.btn-add-compare:disabled { opacity: 0.4; cursor: not-allowed; }

/* Main Layout */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 320px;
  gap: 0;
  min-height: calc(100vh - 160px);
}
.content-area { padding: 20px 24px; overflow-y: auto; }
.sidebar {
  background: var(--surface);
  border-left: 1px solid var(--border);
  padding: 20px;
  overflow-y: auto;
}

/* Section Headers */
.section-header {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-header .icon { font-size: 18px; }

/* Incentive Cards Grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 16px;
  margin-bottom: 32px;
}
.incentive-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 16px;
  transition: border-color 0.2s, transform 0.15s;
}
.incentive-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.type-badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
.stackable-badge {
  font-size: 11px;
  color: var(--green);
  display: flex;
  align-items: center;
  gap: 4px;
}
.card-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
.card-description { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.4; }
.card-amount {
  font-size: 24px;
  font-weight: 800;
  margin-bottom: 12px;
  letter-spacing: -0.5px;
}
.card-models {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.model-chip {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 2px 10px;
  font-size: 12px;
  color: var(--text-muted);
}
.card-expiry {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--text-muted);
  margin-bottom: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.expiry-countdown {
  font-weight: 600;
}
.expiry-countdown.urgent { color: var(--red); }
.expiry-countdown.soon { color: var(--orange); }
.fine-print-toggle {
  background: none;
  border: none;
  color: var(--accent);
  font-size: 12px;
  cursor: pointer;
  padding: 4px 0;
  transition: color 0.15s;
}
.fine-print-toggle:hover { color: var(--accent-hover); text-decoration: underline; }
.fine-print {
  display: none;
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.5;
  margin-top: 8px;
  padding: 10px;
  background: var(--bg);
  border-radius: 6px;
}
.fine-print.expanded { display: block; }

/* Comparison Table */
.comparison-section { margin-top: 8px; }
.comparison-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
  margin-bottom: 32px;
}
.comparison-table th {
  text-align: left;
  padding: 10px 12px;
  background: var(--surface2);
  border-bottom: 2px solid var(--border);
  font-weight: 700;
  font-size: 13px;
}
.comparison-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
}
.comparison-table tr:hover td { background: rgba(59,130,246,0.04); }
.comp-cell-best { font-weight: 700; }
.comp-cell-value { font-size: 14px; font-weight: 600; }
.comp-cell-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.comp-cell-none { color: var(--text-muted); font-style: italic; }

/* Sidebar - Calculator */
.calc-section { margin-bottom: 20px; }
.calc-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 6px;
}
.calc-input {
  width: 100%;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 14px;
  outline: none;
  margin-bottom: 12px;
}
.calc-input:focus { border-color: var(--accent); }
.incentive-checks { margin-bottom: 16px; }
.incentive-check-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  font-size: 13px;
  cursor: pointer;
}
.incentive-check-item input[type="checkbox"] {
  accent-color: var(--accent);
  width: 16px;
  height: 16px;
}
.incentive-check-item .check-amount {
  margin-left: auto;
  font-weight: 600;
  font-size: 12px;
}
.calc-divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 16px 0;
}
.calc-summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  font-size: 14px;
}
.calc-summary-row.total {
  font-size: 16px;
  font-weight: 700;
  padding: 10px 0;
}
.calc-summary-row .label { color: var(--text-muted); }
.calc-summary-row .value { font-weight: 600; }
.calc-summary-row .value.savings { color: var(--green); }
.calc-monthly {
  background: var(--bg);
  border-radius: 8px;
  padding: 14px;
  margin-top: 12px;
  text-align: center;
}
.calc-monthly .monthly-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.calc-monthly .monthly-value { font-size: 28px; font-weight: 800; color: var(--accent); }
.calc-monthly .monthly-detail { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* Empty/Loading States */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; margin-bottom: 8px; color: var(--text); }
.empty-state p { font-size: 14px; line-height: 1.5; }
.loading-spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 3px solid var(--surface2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Make header in cards */
.make-group-header {
  font-size: 18px;
  font-weight: 700;
  margin: 24px 0 12px 0;
  padding-bottom: 8px;
  border-bottom: 2px solid var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}
.make-group-header:first-child { margin-top: 0; }
.incentive-count-badge {
  background: var(--accent);
  color: #fff;
  border-radius: 10px;
  padding: 2px 8px;
  font-size: 12px;
  font-weight: 600;
}

/* Responsive */
@media (max-width: 900px) {
  .main-layout { grid-template-columns: 1fr; }
  .sidebar { border-left: none; border-top: 1px solid var(--border); }
  .cards-grid { grid-template-columns: 1fr; }
}
