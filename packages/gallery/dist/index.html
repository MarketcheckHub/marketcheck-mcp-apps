/* ── Light Theme (default) — matching Cowork portal ─────────────── */
:root, [data-theme="light"] {
  --bg: #F4F7FF;
  --surface: #FFFFFF;
  --card: #FFFFFF;
  --border: #D8E3F2;
  --border-light: #EBF0FA;
  --text: #344B68;
  --text-heading: #0B1C3F;
  --muted: #6B7F9E;
  --brand: #1A6FD8;
  --brand-light: #1A8CFF;
  --green: #059669;
  --yellow: #d97706;
  --purple: #7c3aed;
  --red: #dc2626;
  --pink: #db2777;
  --orange: #ea580c;
  --cyan: #0891b2;
  --card-shadow: 0 1px 3px rgba(11, 28, 63, 0.06), 0 4px 16px rgba(11, 28, 63, 0.04);
  --card-hover-shadow: 0 2px 8px rgba(26, 111, 216, 0.12), 0 8px 32px rgba(26, 111, 216, 0.08);
  --hero-gradient-a: rgba(26, 111, 216, 0.1);
  --hero-gradient-b: rgba(6, 106, 171, 0.06);
  --hero-point-color: rgba(26, 111, 216, 0.2);
  --hero-line-color: rgba(26, 111, 216, 0.06);
  --hero-title-gradient: linear-gradient(135deg, #0B1C3F 0%, #1A6FD8 50%, #1A8CFF 100%);
  --badge-demo-bg: rgba(217, 119, 6, 0.1);
  --badge-demo-fg: #b45309;
  --badge-live-bg: rgba(5, 150, 105, 0.1);
  --badge-live-fg: #047857;
  --input-bg: #E8EFFC;
  --scrollbar-thumb: rgba(26, 111, 216, 0.2);
  --scrollbar-track: transparent;
  --nav-shadow: 0 1px 0 #D8E3F2, 0 2px 12px rgba(11, 28, 63, 0.05);
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', 'SF Mono', monospace;
}

/* ── Dark Theme — matching Cowork portal ───────────────────────── */
[data-theme="dark"] {
  --bg: #0B1929;
  --surface: #0F2237;
  --card: #0F2237;
  --border: rgba(26, 140, 255, 0.12);
  --border-light: rgba(26, 140, 255, 0.06);
  --text: #94A3B8;
  --text-heading: #F1F5F9;
  --muted: #64748B;
  --brand: #1A8CFF;
  --brand-light: #6BB3FF;
  --green: #10b981;
  --yellow: #f59e0b;
  --purple: #8b5cf6;
  --red: #ef4444;
  --pink: #ec4899;
  --orange: #f97316;
  --cyan: #06b6d4;
  --card-shadow: none;
  --card-hover-shadow: none;
  --hero-gradient-a: rgba(26, 140, 255, 0.1);
  --hero-gradient-b: rgba(6, 106, 171, 0.05);
  --hero-point-color: rgba(26, 140, 255, 0.3);
  --hero-line-color: rgba(26, 140, 255, 0.04);
  --hero-title-gradient: linear-gradient(135deg, #F1F5F9 0%, #6BB3FF 50%, #1A8CFF 100%);
  --badge-demo-bg: rgba(245, 158, 11, 0.15);
  --badge-demo-fg: #f59e0b;
  --badge-live-bg: rgba(16, 185, 129, 0.15);
  --badge-live-fg: #34d399;
  --input-bg: #081420;
  --scrollbar-thumb: rgba(26, 140, 255, 0.15);
  --scrollbar-track: transparent;
  --nav-shadow: none;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  scroll-behavior: smooth;
  scrollbar-width: thin;
  scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}

::selection { background: var(--brand); color: #fff; }

/* ── Hero ─────────────────────────────────── */

/* ── Hero — Cowork-style grid bg ─────── */
.hero {
  position: relative;
  min-height: 80vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 100px 24px 60px;
  overflow: hidden;
  background:
    radial-gradient(ellipse 80% 50% at 50% -20%, var(--hero-gradient-a), transparent),
    radial-gradient(ellipse 60% 40% at 80% 50%, var(--hero-gradient-b), transparent);
}

/* Grid pattern overlay */
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--hero-line-color) 1px, transparent 1px),
    linear-gradient(90deg, var(--hero-line-color) 1px, transparent 1px);
  background-size: 60px 60px;
  z-index: 0;
}

.hero-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.hero-bg canvas { width: 100%; height: 100%; }

.hero-content {
  position: relative;
  z-index: 1;
  text-align: center;
  max-width: 800px;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  border-radius: 999px;
  background: rgba(26, 111, 216, 0.08);
  border: 1px solid rgba(26, 111, 216, 0.15);
  color: var(--brand);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 24px;
  animation: fadeInDown 0.8s ease;
}
.hero-badge .badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--brand);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.hero h1 {
  font-size: clamp(32px, 6vw, 72px);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -1px;
  color: var(--text-heading);
  margin-bottom: 24px;
  animation: fadeInUp 0.7s ease;
}
.hero h1 .accent-word {
  background: linear-gradient(135deg, #1A8CFF, #6BB3FF);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero .subtitle {
  font-size: clamp(15px, 2vw, 18px);
  color: var(--muted);
  max-width: 640px;
  margin: 0 auto 40px;
  font-weight: 400;
  line-height: 1.7;
  animation: fadeInUp 0.7s ease 0.1s backwards;
}

.hero-ctas {
  display: flex;
  gap: 16px;
  justify-content: center;
  flex-wrap: wrap;
  animation: fadeInUp 0.7s ease 0.2s backwards;
}

/* ── Buttons — Cowork pill style ─────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 14px 32px;
  border-radius: 999px;
  font-size: 15px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  border: none;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  text-decoration: none;
}

.btn-primary {
  background: #1A8CFF;
  color: #fff;
  box-shadow: 0 8px 24px rgba(26, 140, 255, 0.2);
}
.btn-primary:hover {
  background: #066aab;
  box-shadow: 0 8px 32px rgba(26, 140, 255, 0.3);
  transform: translateY(-1px);
}

.btn-secondary {
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover {
  border-color: rgba(26, 111, 216, 0.3);
  color: var(--text-heading);
  transform: translateY(-1px);
}

/* ── Hero Stats — Cowork style ───────── */
.hero-stats {
  display: flex;
  gap: 48px;
  justify-content: center;
  margin-top: 56px;
  animation: fadeInUp 0.7s ease 0.35s backwards;
}

.hero-stat {
  text-align: center;
}
.hero-stat .val {
  font-size: 36px;
  font-weight: 700;
  color: var(--text-heading);
  letter-spacing: -0.5px;
}
.hero-stat .lbl {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-top: 4px;
}

/* ── Theme Toggle ─────────────────────── */

.theme-toggle {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
  box-shadow: var(--card-shadow);
}
.theme-toggle:hover {
  color: var(--text);
  border-color: var(--brand);
  box-shadow: var(--card-hover-shadow);
}
.hero-stat .lbl {
  font-size: 12px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 4px;
}

/* ── Modes Section ────────────────────────── */

.section {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 24px;
}

.section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 32px;
  padding-left: 4px;
}

.modes {
  padding: 60px 0 80px;
}

.mode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
}

.mode-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 28px 24px;
  transition: all 0.3s ease;
  cursor: default;
  position: relative;
  overflow: hidden;
}
.mode-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity 0.3s ease;
}
.mode-card:hover {
  border-color: var(--border-light);
  transform: translateY(-2px);
  box-shadow: var(--card-hover-shadow);
}
.mode-card:hover::before { opacity: 1; }

.mode-card[data-color="yellow"]::before { background: var(--yellow); }
.mode-card[data-color="green"]::before { background: var(--green); }
.mode-card[data-color="purple"]::before { background: var(--purple); }
.mode-card[data-color="blue"]::before { background: var(--brand); }

.mode-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.mode-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.mode-card[data-color="yellow"] .mode-icon { background: rgba(245, 158, 11, 0.12); color: var(--yellow); }
.mode-card[data-color="green"] .mode-icon { background: rgba(16, 185, 129, 0.12); color: var(--green); }
.mode-card[data-color="purple"] .mode-icon { background: rgba(139, 92, 246, 0.12); color: var(--purple); }
.mode-card[data-color="blue"] .mode-icon { background: rgba(6, 106, 171, 0.12); color: var(--brand-light); }

.mode-badge {
  padding: 3px 10px;
  border-radius: 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.8px;
}
.mode-card[data-color="yellow"] .mode-badge { background: rgba(245, 158, 11, 0.15); color: var(--yellow); }
.mode-card[data-color="green"] .mode-badge { background: rgba(16, 185, 129, 0.15); color: var(--green); }
.mode-card[data-color="purple"] .mode-badge { background: rgba(139, 92, 246, 0.15); color: var(--purple); }
.mode-card[data-color="blue"] .mode-badge { background: rgba(6, 106, 171, 0.15); color: var(--brand-light); }

.mode-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text-heading);
}

.mode-desc {
  font-size: 14px;
  color: var(--muted);
  line-height: 1.5;
}

.mode-link {
  display: inline-block;
  margin-top: 12px;
  font-size: 13px;
  color: var(--brand-light);
  text-decoration: none;
  font-weight: 500;
}
.mode-link:hover { text-decoration: underline; }

/* ── Auth Panel ───────────────────────────── */

.auth-panel {
  max-width: 1280px;
  margin: 0 auto 60px;
  padding: 0 24px;
}

.auth-container {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  display: none;
}
.auth-container.open { display: block; animation: slideDown 0.3s ease; }

.auth-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.auth-tab {
  flex: 1;
  padding: 14px;
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  background: none;
  border: none;
  font-family: var(--font);
  transition: all 0.2s;
  border-bottom: 2px solid transparent;
}
.auth-tab.active {
  color: var(--text);
  border-bottom-color: var(--brand);
  background: rgba(6, 106, 171, 0.05);
}
.auth-tab:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.02); }

.auth-body { padding: 28px; }
.auth-pane { display: none; }
.auth-pane.active { display: block; }

.auth-field {
  margin-bottom: 16px;
}

.auth-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.auth-input {
  width: 100%;
  padding: 12px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--input-bg);
  color: var(--text);
  font-size: 14px;
  font-family: var(--mono);
  outline: none;
  transition: border-color 0.2s;
}
.auth-input:focus { border-color: var(--brand); }
.auth-input::placeholder { color: var(--border-light); }

.auth-row {
  display: flex;
  gap: 12px;
  align-items: flex-end;
}
.auth-row .auth-field { flex: 1; }

.auth-hint {
  font-size: 12px;
  color: var(--muted);
  margin-top: 8px;
  line-height: 1.5;
}
.auth-hint a { color: var(--brand-light); text-decoration: none; }
.auth-hint a:hover { text-decoration: underline; }

.auth-warning {
  background: rgba(245, 158, 11, 0.08);
  border: 1px solid rgba(245, 158, 11, 0.2);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  color: var(--yellow);
  margin-top: 16px;
  line-height: 1.5;
}

.token-display {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-top: 16px;
  display: none;
}
.token-display.visible { display: block; animation: fadeIn 0.3s; }

.token-value {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--green);
  word-break: break-all;
  margin-bottom: 8px;
}

.token-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  color: var(--muted);
}

.embed-snippet {
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-top: 12px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--muted);
  white-space: pre-wrap;
  word-break: break-all;
  display: none;
}
.embed-snippet.visible { display: block; }

.btn-sm {
  padding: 8px 16px;
  font-size: 13px;
  border-radius: 6px;
}

/* ── App Grid ─────────────────────────────── */

.apps {
  padding: 0 0 80px;
}

.segment-group {
  margin-bottom: 48px;
}

.segment-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

.segment-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.segment-name {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-heading);
  letter-spacing: 0.3px;
}

.segment-count {
  font-size: 12px;
  color: var(--muted);
  font-family: var(--mono);
}

.app-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

.app-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  transition: all 0.25s ease;
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}
.app-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
.app-card:hover {
  border-color: var(--border-light);
  transform: translateY(-2px);
  box-shadow: var(--card-hover-shadow);
}
.app-card:hover::after { opacity: 1; }

.app-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 8px;
}

.app-name {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-heading);
  line-height: 1.3;
}

.app-mode-badge {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.6px;
  flex-shrink: 0;
  margin-left: 12px;
}
.app-mode-badge.demo { background: var(--badge-demo-bg); color: var(--badge-demo-fg); }
.app-mode-badge.live { background: var(--badge-live-bg); color: var(--badge-live-fg); }

.app-tagline {
  font-size: 13px;
  color: var(--muted);
  line-height: 1.4;
  flex: 1;
  margin-bottom: 16px;
}

.app-thumbnail {
  width: 100%;
  aspect-ratio: 16/10;
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  cursor: pointer;
  position: relative;
  transition: border-color 0.2s;
}
.app-thumbnail:hover { border-color: var(--brand); }
.app-thumbnail img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top left;
  display: block;
}
.app-thumbnail .carousel-images {
  display: flex;
  transition: transform 0.3s ease;
  width: 100%;
  height: 100%;
}
.app-thumbnail .carousel-images img {
  flex-shrink: 0;
  width: 100%;
  height: 100%;
}
.app-thumbnail .carousel-dots {
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 5px;
}
.app-thumbnail .carousel-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.4);
  cursor: pointer;
  transition: background 0.2s;
}
.app-thumbnail .carousel-dot.active { background: #fff; }
.app-thumbnail .carousel-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  cursor: pointer;
  font-size: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transition: opacity 0.2s;
}
.app-thumbnail:hover .carousel-nav { opacity: 1; }
.app-thumbnail .carousel-prev { left: 6px; }
.app-thumbnail .carousel-next { right: 6px; }
.app-thumbnail .zoom-hint {
  position: absolute;
  top: 8px;
  right: 8px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.2s;
}
.app-thumbnail:hover .zoom-hint { opacity: 1; }

.app-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.app-segment-badge {
  padding: 3px 10px;
  border-radius: 5px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

/* Title link */
.app-name-link {
  font-size: 15px;
  font-weight: 700;
  color: var(--text-heading);
  line-height: 1.3;
  text-decoration: none;
  transition: color 0.2s;
}
.app-name-link:hover { color: var(--brand); text-decoration: none; }

/* View Details button */
.app-details-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 7px 16px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  border: 1px solid var(--border);
  text-decoration: none;
  transition: all 0.2s;
  font-family: var(--font);
}
.app-details-btn:hover {
  color: var(--brand);
  border-color: var(--brand);
  background: rgba(6, 106, 171, 0.06);
  text-decoration: none;
}

/* Coming Soon — only affects the launch button, not the preview */
.app-card.coming-soon .app-open-btn {
  opacity: 0.4; pointer-events: none; cursor: default;
}
.app-card.coming-soon .app-open-btn:hover { transform: none; }

/* Share button overlay on thumbnail */
.thumb-overlay-btns {
  position: absolute;
  top: 8px;
  right: 8px;
  z-index: 5;
  opacity: 0;
  transition: opacity 0.2s;
}
.app-card:hover .thumb-overlay-btns { opacity: 1; }
.thumb-overlay-btns .app-share-btn {
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(4px);
  border: none;
  color: #fff;
  border-radius: 8px;
}
.thumb-overlay-btns .app-share-btn:hover {
  background: rgba(0,0,0,0.75);
  color: #fff;
}
.thumb-overlay-btns .share-menu {
  right: 0;
  left: auto;
}

/* Category nav strip */
.category-nav {
  display: flex;
  gap: 8px;
  padding: 16px 24px;
  overflow-x: auto;
  scrollbar-width: none;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 1200px;
  margin: 0 auto;
}
.category-nav::-webkit-scrollbar { display: none; }
.category-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  text-decoration: none;
  white-space: nowrap;
  transition: all 0.2s;
}
.category-chip:hover {
  border-color: var(--brand);
  color: var(--brand);
  text-decoration: none;
}
.category-chip .chip-count {
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  background: var(--border);
  color: var(--text);
}

.app-source-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: 6px;
  color: var(--muted);
  border: 1px solid var(--border);
  transition: all 0.2s;
  text-decoration: none;
}
.app-source-link:hover {
  color: var(--text);
  border-color: var(--border-light);
  background: rgba(6, 106, 171, 0.08);
}

.app-share-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: 6px;
  color: var(--muted);
  border: 1px solid var(--border);
  background: none;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 14px;
  font-family: var(--font);
  padding: 0;
  position: relative;
}
.app-share-btn:hover {
  color: var(--text);
  border-color: var(--border-light);
  background: rgba(6, 106, 171, 0.08);
}

.lightbox-overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s;
  cursor: pointer;
  backdrop-filter: blur(8px);
}
.lightbox-overlay img {
  max-width: 92vw;
  max-height: 88vh;
  border-radius: 8px;
  box-shadow: 0 16px 64px rgba(0,0,0,0.5);
  cursor: default;
}
.lightbox-close {
  position: fixed;
  top: 16px;
  right: 20px;
  z-index: 301;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lightbox-close:hover { background: rgba(255,255,255,0.2); }

.share-menu {
  position: absolute;
  bottom: 40px;
  right: 0;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
  z-index: 10;
  display: none;
  min-width: 170px;
}
.share-menu.open { display: block; animation: slideDown 0.2s ease; }
.share-menu a, .share-menu button {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--text);
  text-decoration: none;
  border: none;
  background: none;
  border-radius: 4px;
  cursor: pointer;
  font-family: var(--font);
  text-align: left;
}
.share-menu a:hover, .share-menu button:hover { background: rgba(6,106,171,0.1); }

.app-open-btn {
  padding: 7px 18px;
  border-radius: 6px;
  background: rgba(6, 106, 171, 0.12);
  border: 1px solid rgba(6, 106, 171, 0.25);
  color: var(--brand-light);
  font-size: 12px;
  font-weight: 600;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.2s;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.app-open-btn:hover {
  background: rgba(6, 106, 171, 0.25);
  border-color: var(--brand);
  transform: translateX(2px);
}

/* ── Top Nav ──────────────────────────────── */

.top-nav {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 50;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

[data-theme="light"] .top-nav { background: rgba(255,255,255,0.8); box-shadow: var(--nav-shadow); }
[data-theme="dark"] .top-nav { background: rgba(15,34,55,0.8); }

.nav-inner {
  max-width: 1280px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 56px;
}

.nav-left {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
}

.nav-logo {
  height: 32px;
  border-radius: 6px;
}

.nav-brand {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.nav-brand-mc {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-heading);
  letter-spacing: -0.3px;
}
.nav-brand-sub {
  font-size: 11px;
  font-weight: 600;
  color: var(--brand);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.nav-center {
  display: flex;
  align-items: center;
  gap: 32px;
}

.nav-link {
  font-size: 14px;
  color: var(--muted);
  text-decoration: none;
  font-weight: 400;
  transition: color 0.2s;
}
.nav-link:hover {
  color: var(--text-heading);
  text-decoration: none;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.nav-cta {
  padding: 8px 20px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all 0.2s;
}
.nav-cta-outline {
  background: rgba(26, 111, 216, 0.08);
  border: 1px solid rgba(26, 111, 216, 0.15);
  color: var(--brand);
}
.nav-cta-outline:hover {
  background: rgba(26, 111, 216, 0.15);
  border-color: rgba(26, 111, 216, 0.3);
  text-decoration: none;
}
.nav-cta-primary {
  background: rgba(26, 111, 216, 0.08);
  border: 1px solid rgba(26, 111, 216, 0.2);
  color: var(--brand);
}
.nav-cta-primary:hover {
  background: rgba(26, 111, 216, 0.15);
  border-color: rgba(26, 111, 216, 0.3);
  text-decoration: none;
}
.nav-cta svg { width: 14px; height: 14px; fill: currentColor; }

/* Mobile hamburger */
.nav-hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 24px;
  cursor: pointer;
  padding: 4px;
  line-height: 1;
}

.nav-mobile-menu {
  display: none;
  position: fixed;
  top: 56px;
  left: 0;
  right: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px 16px;
  z-index: 49;
  flex-direction: column;
  gap: 2px;
}
.nav-mobile-menu.open { display: flex; }
.nav-mobile-menu a {
  display: block;
  padding: 10px 12px;
  font-size: 14px;
  color: var(--muted);
  text-decoration: none;
  border-radius: 6px;
  font-weight: 500;
}
.nav-mobile-menu a:hover { background: rgba(6,106,171,0.06); color: var(--text); }

@media (max-width: 900px) {
  .nav-center { display: none; }
  .nav-hamburger { display: block; }
}
@media (max-width: 640px) {
  .nav-right .nav-cta-outline { display: none; }
}

/* ── Modal ────────────────────────────────── */

.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 200;
  background: rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s;
  backdrop-filter: blur(4px);
}

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 32px;
  max-width: 440px;
  width: 90%;
  box-shadow: 0 16px 48px rgba(0,0,0,0.3);
  animation: slideDown 0.3s ease;
}

.modal h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-heading);
  margin-bottom: 8px;
}

.modal p {
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 20px;
  line-height: 1.5;
}

.modal-actions {
  display: flex;
  gap: 10px;
}

.modal-actions .btn { flex: 1; justify-content: center; }

/* ── Toast ─────────────────────────────────── */

.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green);
  color: #fff;
  padding: 12px 24px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  z-index: 300;
  opacity: 0;
  transition: all 0.3s ease;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Footer ───────────────────────────────── */

.footer {
  border-top: 1px solid var(--border);
  padding: 40px 24px;
  text-align: center;
}

.footer-text {
  font-size: 13px;
  color: var(--muted);
}
.footer-text a {
  color: var(--brand-light);
  text-decoration: none;
}
.footer-text a:hover { text-decoration: underline; }

.footer-sep {
  display: inline-block;
  margin: 0 12px;
  color: var(--border-light);
}

/* ── Animations ───────────────────────────── */

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}

.stagger { animation: fadeInUp 0.5s ease backwards; }

/* ── Responsive ───────────────────────────── */

/* Tablet */
@media (max-width: 900px) {
  .app-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  .mode-grid { grid-template-columns: repeat(2, 1fr); }
  .hero h1 { font-size: 36px; letter-spacing: -1px; }
  .hero h1 img { height: 40px !important; margin-right: 8px !important; }
  .hero-stats { gap: 28px; }
}

/* Mobile */
@media (max-width: 640px) {
  /* Nav */
  .top-nav { padding: 10px 12px; gap: 6px; }
  .nav-title { font-size: 13px; }
  .nav-inner { padding: 0 12px; }
  .nav-logo { height: 24px; }
  .nav-brand-mc { font-size: 15px; }
  .nav-brand-sub { font-size: 10px; }
  .theme-toggle { width: 32px !important; height: 32px !important; font-size: 14px !important; }

  /* Hero */
  .hero { min-height: auto; padding: 80px 16px 40px; }
  .hero h1 { font-size: 28px; letter-spacing: -0.5px; }
  .hero h1 img { height: 32px !important; margin-right: 6px !important; }
  .hero .subtitle { font-size: 14px; }
  .hero-badge { font-size: 10px; padding: 4px 12px; }
  .hero-ctas { flex-direction: column; width: 100%; }
  .hero-ctas .btn { width: 100%; justify-content: center; }
  .hero-stats { gap: 16px; flex-wrap: wrap; }
  .hero-stat .val { font-size: 22px; }
  .hero-stat .lbl { font-size: 10px; }

  /* Sections */
  .section { padding: 0 12px; }
  .section-title { font-size: 12px; margin-bottom: 20px; }

  /* Mode cards */
  .modes { padding: 40px 0 50px; }
  .mode-grid { grid-template-columns: 1fr; gap: 10px; }
  .mode-card { padding: 20px 16px; }
  .mode-icon { width: 34px; height: 34px; font-size: 15px; }
  .mode-title { font-size: 14px; }
  .mode-desc { font-size: 13px; }

  /* App grid */
  .apps { padding: 0 0 50px; }
  .app-grid { grid-template-columns: 1fr; gap: 10px; }
  .app-card { padding: 16px; }
  .app-name { font-size: 14px; }
  .app-tagline { font-size: 12px; margin-bottom: 12px; }
  .app-segment-badge { font-size: 9px; padding: 2px 8px; }
  .app-open-btn { font-size: 11px; padding: 6px 14px; }
  .app-source-link { width: 26px; height: 26px; }
  .app-source-link svg { width: 12px; height: 12px; }
  .segment-header { margin-bottom: 14px; padding-bottom: 8px; }
  .segment-name { font-size: 13px; }
  .segment-group { margin-bottom: 32px; }

  /* Auth panel */
  .auth-panel { padding: 0 12px; }
  .auth-body { padding: 16px; }
  .auth-row { flex-direction: column; }
  .auth-input { font-size: 13px; padding: 10px 12px; }
  .auth-tab { font-size: 12px; padding: 10px; }
  .auth-warning { font-size: 12px; padding: 10px 12px; }

  /* Modal */
  .modal { padding: 20px; max-width: 95%; }
  .modal h3 { font-size: 16px; }
  .modal p { font-size: 13px; }
  .modal-actions { flex-direction: column; }
  .modal-actions .btn { width: 100%; }

  /* Inline instruction panels */
  #embed-instructions-panel > div,
  #mcp-instructions-panel > div { padding: 16px; max-width: 100% !important; }
  #embed-instructions-panel code,
  #mcp-instructions-panel code { font-size: 10px; padding: 8px; }

  /* Footer */
  .footer { padding: 24px 12px; }
  .footer-text { font-size: 11px; line-height: 2; }
  .footer-sep { margin: 0 6px; }

  /* Toast */
  .toast { font-size: 13px; padding: 10px 20px; max-width: 90%; }
}

/* Small mobile */
@media (max-width: 380px) {
  .hero h1 { font-size: 24px; }
  .hero h1 img { height: 26px !important; }
  .nav-brand { font-size: 13px; }
  .hero-stats { gap: 12px; }
  .hero-stat .val { font-size: 18px; }
}
